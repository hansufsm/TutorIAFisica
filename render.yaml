services:
  - type: web
    name: tutor-ia-fisica-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        # Vercel deployment URL — update after deploying frontend to Vercel
        # Format: https://<project-name>.vercel.app or custom domain
        # Configure via Render dashboard after Vercel deployment
        value: https://YOUR_VERCEL_DOMAIN.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
